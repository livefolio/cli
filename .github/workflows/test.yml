name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rewrite GitHub SSH URLs to HTTPS
        run: |
          git config --global url."https://github.com/".insteadOf ssh://git@github.com/
          git config --global url."https://github.com/".insteadOf git@github.com:

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Check version bump
        run: |
          PR_VERSION=$(node -p "require('./package.json').version")
          MAIN_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::Version in package.json ($PR_VERSION) has not been bumped. Run 'npm version patch' before merging."
            exit 1
          fi
